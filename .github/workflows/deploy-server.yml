name: Build and deploy server

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: catalogos-production
  cancel-in-progress: false

env:
  IMAGE_NAME: techchaide/catalogos-pdf

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VITE_BASE_PATH=/catalogos/
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: docker-compose.yml
          target: ${{ secrets.SERVER_DEPLOY_PATH }}
          overwrite: true

      - name: Pull and restart service
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          command_timeout: 15m
          script: |
            set -eu
            cd "${{ secrets.SERVER_DEPLOY_PATH }}"
            test -f .env
            docker network inspect traefik-net >/dev/null
            docker compose pull catalogos-pdf
            docker compose up -d --no-deps catalogos-pdf
            for attempt in $(seq 1 30); do
              status="$(docker inspect --format='{{.State.Health.Status}}' catalogos_pdf_prod 2>/dev/null || true)"
              if [ "$status" = "healthy" ]; then
                docker image prune -f
                exit 0
              fi
              if [ "$status" = "unhealthy" ]; then
                docker logs --tail 100 catalogos_pdf_prod
                exit 1
              fi
              sleep 5
            done
            docker logs --tail 100 catalogos_pdf_prod
            exit 1
