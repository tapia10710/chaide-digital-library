# Chaide Biblioteca Digital - montaje con Docker
#
# 1. Copia ".env.docker.example" a ".env" y define clave y token.
# 2. Ejecuta: docker compose up -d --build
# 3. Abre: http://IP-DEL-SERVIDOR:8080
#
# Los PDF, portadas, configuracion e indices permanecen en "chaide-data".

services:
  web:
    build: .
    image: chaide-biblioteca-digital:latest
    container_name: chaide-biblioteca
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATA_DIR: /data
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Define ADMIN_PASSWORD en el archivo .env}"
      ADMIN_TOKEN: "${ADMIN_TOKEN:?Define ADMIN_TOKEN en el archivo .env}"
    volumes:
      - chaide-data:/data

volumes:
  chaide-data:
